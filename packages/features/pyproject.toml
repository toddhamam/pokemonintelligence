[project]
name = "miami-features"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "miami-common",
    "miami-domain",
    "polars>=1.18",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/miami_features"]
