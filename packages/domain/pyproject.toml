[project]
name = "miami-domain"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "miami-common",
    "sqlalchemy>=2.0.36",
    "pgvector>=0.3",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/miami_domain"]
